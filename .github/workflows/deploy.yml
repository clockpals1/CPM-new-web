name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Frontend → Cloudflare Pages ──────────────────────────────────────────
  frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Build
        working-directory: frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          CI: ''        # prevent ESLint warnings from aborting the build

      - name: Verify SPA Worker is in build output
        working-directory: frontend
        run: |
          echo "--- SPA routing files ---"
          ls -la build/_worker.js build/_redirects 2>/dev/null || true
          echo "--- _worker.js preview ---"
          head -6 build/_worker.js

      - name: List all Cloudflare Pages projects (find the live one)
        working-directory: frontend
        run: |
          echo "=== All Cloudflare Pages projects in this account ==="
          npx wrangler pages project list 2>&1 || echo "Could not list projects"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (all likely project names)
        working-directory: frontend
        run: |
          SHORT=$(git rev-parse --short HEAD)
          DEPLOY_ARGS="build --branch main --commit-dirty=true --commit-message Deploy-${SHORT}"
          deployed=0

          for PROJECT in cpm cpm-new-web cpmnewweb celestialpeoplemeet cpm-web; do
            echo ""
            echo "--- Trying project: $PROJECT ---"
            if npx wrangler pages deploy $DEPLOY_ARGS --project-name "$PROJECT" 2>&1; then
              echo "SUCCESS: deployed to $PROJECT"
              deployed=$((deployed + 1))
            else
              echo "SKIP: $PROJECT not found or failed"
            fi
          done

          echo ""
          echo "=== Deployed to $deployed project(s) ==="
          if [ "$deployed" -eq 0 ]; then
            echo "ERROR: No project accepted the deployment."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Backend → Render ─────────────────────────────────────────────────────
  backend:
    name: Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsSL -X POST "$HOOK"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — Render will auto-deploy from its own GitHub integration."
          fi
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
