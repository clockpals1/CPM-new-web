name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Frontend → Cloudflare Pages ──────────────────────────────────────────
  frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: yarn install

      - name: Build
        working-directory: frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          CI: ''        # prevent ESLint warnings from aborting the build

      - name: Verify SPA Worker is in build output
        working-directory: frontend
        run: |
          echo "--- SPA routing files ---"
          ls -la build/_worker.js build/_redirects 2>/dev/null || true
          echo "--- _worker.js preview ---"
          head -6 build/_worker.js

      - name: Create Cloudflare Pages project (if not exists)
        working-directory: frontend
        run: npx wrangler pages project create cpm --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name cpm --branch main --commit-dirty=true
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Backend → Render ─────────────────────────────────────────────────────
  backend:
    name: Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsSL -X POST "$HOOK"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — Render will auto-deploy from its own GitHub integration."
          fi
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
